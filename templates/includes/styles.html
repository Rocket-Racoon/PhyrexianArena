    /* Contenedor del Switch */
    .custom-phyrexian-switch {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
    }
    .custom-phyrexian-switch input[type="checkbox"] {
        position: relative;
        width: 40px;
        height: 20px;
        appearance: none;
        -webkit-appearance: none;
        background: #333; /* Fondo apagado */
        border: 1px solid #555;
        border-radius: 20px;
        outline: none;
        transition: .4s;
        cursor: pointer;
        display: inline-block !important; /* Fuerza visibilidad */
        visibility: visible !important;
        opacity: 1 !important;
    }
    .custom-phyrexian-switch input[type="checkbox"]::before {
        content: '';
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        top: 2px;
        left: 2px;
        background: #777;
        transition: .4s;
    }
    .custom-phyrexian-switch input[type="checkbox"]:checked {
        background: #8b0000; /* Rojo Phyrexian */
        border-color: #ff4444;
    }
    .custom-phyrexian-switch input[type="checkbox"]:checked::before {

        background: #fff;

    }
    .custom-phyrexian-switch label {

    }
